name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Backend Tests and Linting
  backend-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./backend
      run: npm ci
    
    - name: Run linter
      working-directory: ./backend
      run: npm run lint || echo "Linting not configured yet"
    
    - name: Initialize database
      working-directory: ./backend
      run: npm run init
    
    - name: Seed database
      working-directory: ./backend
      run: npm run seed
    
    - name: Run tests
      working-directory: ./backend
      run: npm test || echo "Tests not configured yet"
    
    - name: Test Phase 4 endpoints
      working-directory: ./backend
      run: |
        npm run dev &
        sleep 10
        node test-phase4.js
  
  # Frontend Tests and Build
  frontend-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: urbanflow_app/package-lock.json
    
    - name: Install dependencies
      working-directory: ./urbanflow_app
      run: npm ci
    
    - name: Check JavaScript syntax
      working-directory: ./urbanflow_app
      run: |
        npx eslint . --ext .js,.jsx || echo "ESLint not configured yet"
    
    - name: Build check (web)
      working-directory: ./urbanflow_app
      run: npx expo export:web || echo "Web build not configured yet"
  
  # Docker Build and Test
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build backend Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: false
        tags: urbanflow-backend:${{ github.sha }}
        cache-from: type=registry,ref=urbanflow-backend:buildcache
        cache-to: type=inline
    
    - name: Build frontend Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./urbanflow_app
        push: false
        tags: urbanflow-frontend:${{ github.sha }}
        cache-from: type=registry,ref=urbanflow-frontend:buildcache
        cache-to: type=inline
    
    - name: Test Docker Compose
      run: |
        docker compose up -d
        sleep 30
        curl http://localhost:3000/health
        docker compose down
  
  # Code Quality Checks
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check file sizes
      run: |
        find . -type f -size +1M ! -path "*/node_modules/*" ! -path "*/.git/*" || echo "No large files found"
    
    - name: Validate JSON files
      run: |
        find . -name "*.json" ! -path "*/node_modules/*" -exec jq empty {} \; || echo "JSON validation not available"
    
    - name: Check for secrets in code
      run: |
        grep -r "API_KEY\|SECRET\|PASSWORD" --include="*.js" --include="*.jsx" . || echo "No obvious secrets found"
  
  # Deploy to Staging (on develop branch)
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, docker-build]
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to staging
      run: |
        echo "🚀 Deploying to staging environment..."
        echo "This would trigger deployment scripts"
        # Add actual deployment commands here
  
  # Deploy to Production (on main branch)
  deploy-production:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, docker-build]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to production
      run: |
        echo "🚀 Deploying to production environment..."
        echo "This would trigger deployment scripts"
        # Add actual deployment commands here
