services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: urbanflow-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./data:/data
      - backend_logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CORS_ORIGIN=http://localhost:8081
      - LOG_LEVEL=info
      # Phase 4 - GTFS-RT Configuration
      - GTFS_RT_SOURCE=delhi
      - DELHI_API_URL=https://otd.delhi.gov.in/api/realtime
      - DELHI_API_KEY=${DELHI_API_KEY:-}
    networks:
      - urbanflow-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Expo Service (Optional - for development)
  frontend:
    build:
      context: ./urbanflow_app
      dockerfile: Dockerfile
    container_name: urbanflow-frontend
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ./urbanflow_app:/app
      - /app/node_modules
    environment:
      - EXPO_PUBLIC_API_URL=http://localhost:3000/api/v1
      - EXPO_NO_TELEMETRY=1
      - CI=true
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - urbanflow-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8081',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Note: For mobile testing, run Expo locally instead of in Docker
    # This is mainly for web preview or API testing

networks:
  urbanflow-network:
    driver: bridge

volumes:
  backend_logs:
    driver: local

